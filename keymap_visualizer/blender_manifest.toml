schema_version = "1.0.0"

id = "keymap_visualizer"
version = "1.0.0"
name = "Keymap Visualizer"
tagline = "Visual keyboard-based keymap editor"
maintainer = "Devanshu Tak <charutak.davc@gmail.com>"
type = "add-on"

website = "https://github.com/devanshutak25/blenderKey"

tags = ["User Interface", "System"]

blender_version_min = "5.1.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

copyright = [
  "2026 Devanshu Tak",
  "2011 Google Inc. (Roboto Condensed font)",
]

[permissions]
files = "Export keymap configurations and save/load presets to disk"
clipboard = "Copy and paste keymap presets as JSON via the system clipboard"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "*.pyc",
  "profiler.py",
]
